<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Collector Config Editor</title>
</head>

<body>

<h1>Collector Config Editor</h1>

<h2>Endpoints</h2>

<div id="endpointList">
    Brak endpointów.
</div>

<h2>Dodaj endpoint</h2>

<p>
    <label>
        Opis:
        <input id="descriptionInput" type="text">
    </label>
</p>

<p>
    <label>
        IP:
        <input
            id="ipInput"
            type="text"
            placeholder="192.168.0.1">
    </label>
</p>

<p>
    <label>
        Interfejs:
        <input id="interfaceInput" type="text">
    </label>
</p>

<p>
    <label>
        Interwał [ms]:
        <input
            id="intervalInput"
            type="number"
            value="1000"
            min="1">
    </label>
</p>

<p>
    <label>
        <input id="enabledInput" type="checkbox" checked>
        Włączony
    </label>
</p>

<button id="addButton">Dodaj endpoint</button>

<hr>

<button id="loadButton">Wczytaj konfigurację</button>
<button id="saveButton">Zapisz konfigurację</button>

<p id="statusMessage"></p>

<script src="app.js"></script>

</body>

</html>
