<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Collector Config Editor</title>
</head>

<body>

<h1>Collector Config Editor</h1>

<h2>Endpoints</h2>

<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th width="180">Opis</th>
            <th width="350">URL</th>
            <th width="130">Interfejs</th>
            <th width="100">Interwał</th>
            <th width="90">Stan</th>
            <th width="70">Akcja</th>
        </tr>
    </thead>

    <tbody id="endpointList">
        <tr>
            <td colspan="6">Brak endpointów.</td>
        </tr>
    </tbody>
</table>

<h2>Dodaj endpoint</h2>

<table cellpadding="3">
    <tr>
        <td>
            <label for="descriptionInput">Opis:</label>
        </td>
        <td>
            <input id="descriptionInput" type="text">
        </td>
    </tr>

    <tr>
        <td>
            <label for="ipInput">IP:</label>
        </td>
        <td>
            <input
                id="ipInput"
                type="text"
                placeholder="192.168.0.1">
        </td>
    </tr>

    <tr>
        <td>
            <label for="interfaceInput">Interfejs:</label>
        </td>
        <td>
            <input id="interfaceInput" type="text">
        </td>
    </tr>

    <tr>
        <td>
            <label for="intervalInput">Interwał [ms]:</label>
        </td>
        <td>
            <input
                id="intervalInput"
                type="number"
                value="1000"
                min="1">
        </td>
    </tr>

    <tr>
        <td>
            <label for="enabledInput">Włączony:</label>
        </td>
        <td>
            <input
                id="enabledInput"
                type="checkbox"
                checked>
        </td>
    </tr>

    <tr>
        <td></td>
        <td>
            <button id="addButton">Dodaj endpoint</button>
        </td>
    </tr>
</table>

<hr>

<button id="loadButton">Wczytaj konfigurację</button>
<button id="saveButton">Zapisz konfigurację</button>

<p id="statusMessage"></p>

<script src="app.js"></script>

</body>

</html>
